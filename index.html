<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="Apresentação UNEAL sobre contabilidade, tecnologia e futuro da profissão."
    />
    <meta name="theme-color" content="#ffffff" />
    <title>Contabilidade, Tecnologia e Futuro da Profissão</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="topbar__copy">
          <span class="eyebrow">Apresentação digital</span>
          <h1>Contabilidade, tecnologia e futuro da profissão</h1>
        </div>

        <img class="brand" src="visual/images.png" alt="Logo da UNEAL" />
      </header>

      <main class="main">
        <section class="viewer" aria-label="Galeria de imagens">
          <div class="viewer__chrome">
            <p>Arraste ou deslize para navegar</p>
            <p class="counter" aria-live="polite"><strong data-current>01</strong>/<span data-total>07</span></p>
          </div>

          <div class="carousel" data-carousel tabindex="0">
            <article class="slide" data-slide>
              <figure class="frame">
                <img
                  src="input/1.png"
                  alt="Slide 1 sobre contabilidade, tecnologia e futuro da profissão"
                  loading="eager"
                  fetchpriority="high"
                />
              </figure>
            </article>

            <article class="slide" data-slide>
              <figure class="frame">
                <img
                  src="input/2.png"
                  alt="Slide 2 sobre como a tecnologia mudou a contabilidade"
                  loading="lazy"
                />
              </figure>
            </article>

            <article class="slide" data-slide>
              <figure class="frame">
                <img
                  src="input/3.png"
                  alt="Slide 3 sobre se a IA substitui o contador"
                  loading="lazy"
                />
              </figure>
            </article>

            <article class="slide" data-slide>
              <figure class="frame">
                <img
                  src="input/4.png"
                  alt="Slide 4 sobre a evolução da contabilidade do antes para o hoje"
                  loading="lazy"
                />
              </figure>
            </article>

            <article class="slide" data-slide>
              <figure class="frame">
                <img
                  src="input/5.png"
                  alt="Slide 5 com exemplo prático de tecnologia em ação"
                  loading="lazy"
                />
              </figure>
            </article>

            <article class="slide" data-slide>
              <figure class="frame">
                <img
                  src="input/6.png"
                  alt="Slide 6 sobre por que a tecnologia é importante na contabilidade"
                  loading="lazy"
                />
              </figure>
            </article>

            <article class="slide" data-slide>
              <figure class="frame">
                <img
                  src="input/7.png"
                  alt="Slide 7 sobre como a tecnologia não elimina o contador"
                  loading="lazy"
                />
              </figure>
            </article>
          </div>

          <div class="viewer__controls" aria-label="Controles da apresentação">
            <button class="nav" type="button" data-prev>Anterior</button>

            <div class="dots" role="tablist" aria-label="Selecionar imagem">
              <button class="dot" type="button" data-dot="0" aria-label="Abrir imagem 1"></button>
              <button class="dot" type="button" data-dot="1" aria-label="Abrir imagem 2"></button>
              <button class="dot" type="button" data-dot="2" aria-label="Abrir imagem 3"></button>
              <button class="dot" type="button" data-dot="3" aria-label="Abrir imagem 4"></button>
              <button class="dot" type="button" data-dot="4" aria-label="Abrir imagem 5"></button>
              <button class="dot" type="button" data-dot="5" aria-label="Abrir imagem 6"></button>
              <button class="dot" type="button" data-dot="6" aria-label="Abrir imagem 7"></button>
            </div>

            <button class="nav" type="button" data-next>Avançar</button>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
